name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

# The required gate has two parts: a fast structural syntax check on ubuntu, and
# a real compile on windows — MetaTrader 4's installer is publicly downloadable,
# so CI installs MetaEditor silently and compiles every .mq4 for real.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Structural syntax check (all MQL sources)
        run: node .github/workflows/scripts/check-mql.mjs .

  compile:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install MetaEditor + compile every MQL source
        shell: pwsh
        run: .github/workflows/scripts/compile-mql.ps1
      - name: Upload compiled binaries + log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mql-binaries
          path: |
            **/*.ex4
            **/*.ex5
            compile.log
          if-no-files-found: ignore
